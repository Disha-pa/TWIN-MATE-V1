<!DOCTYPE html>
<html>
<head>
    <title>Goal Setup</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</head>
<body>
<form method="POST">
    <h2>🎯 Set Your Goals ({{ category }})</h2>
    <p>Personalized starter goals are loaded for this category. You can edit them or add your custom ones.</p>

    <input type="hidden" name="category" value="{{ category }}">

    <div id="actions-container"></div>

    <button type="button" onclick="addCustomAction()">➕ Add Custom</button>

    <br><br>
    <button type="submit">✨ Save Goals ✨</button>
</form>

<script>
    loadActions("{{ category }}");
</script>

<div class="bottom-nav">
    <a href="/home"><span class="nav-icon">🏠</span>Home</a>
    <a href="/dashboard"><span class="nav-icon">📋</span>Tracker</a>
    <a href="/chat"><span class="nav-icon">🤖</span>AI ChatBot</a>
    <button type="button" onclick="toggleDarkMode()" class="theme-btn"><span class="nav-icon">🌓</span>Theme</button>
</div>

<script>
const themeKey = "{{ session.get('theme_key', 'theme_guest') }}";
function toggleDarkMode() {
    document.body.classList.toggle("dark");

    if (document.body.classList.contains("dark")) {
        localStorage.setItem(themeKey, "dark");
    } else {
        localStorage.setItem(themeKey, "light");
    }
}

// Load saved theme
window.onload = function () {
    if (localStorage.getItem(themeKey) === "dark") {
        document.body.classList.add("dark");
    }
};
</script>

</body>
</html>
